<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แผนกทันตกรรม — ยอดผู้ป่วยนัดวันนี้</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: #EFF4FB;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #0C447C;
    color: #fff;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 3px solid #85B7EB;
  }
  .brand { display: flex; align-items: center; gap: 12px; }
  .brand svg { width: 38px; height: 38px; flex-shrink: 0; }
  header h1 { font-size: 1.25rem; font-weight: 600; }
  header .sub { font-size: 0.8rem; opacity: 0.7; margin-top: 2px; }
  .date-info { text-align: right; font-size: 0.85rem; opacity: 0.85; line-height: 1.7; }
  .date-info strong { font-size: 1.05rem; display: block; }
  .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .center-card {
    background: #fff;
    border-radius: 16px;
    border: 1px solid #D3E4F5;
    padding: 2.5rem 3rem;
    text-align: center;
    min-width: 320px;
    max-width: 480px;
    width: 100%;
  }

  .card-label {
    font-size: 0.8rem;
    font-weight: 600;
    color: #888780;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.5rem;
  }

  .big-number {
    font-size: 6rem;
    font-weight: 700;
    color: #0C447C;
    line-height: 1;
    margin: 0.25rem 0;
  }

  .unit {
    font-size: 1.1rem;
    color: #5F5E5A;
    margin-bottom: 1.5rem;
  }

  .divider {
    border: none;
    border-top: 1px solid #E8EEF8;
    margin: 1.5rem 0;
  }

  .date-display {
    font-size: 1.1rem;
    font-weight: 500;
    color: #185FA5;
    margin-bottom: 0.35rem;
  }

  .update-time {
    font-size: 0.78rem;
    color: #888780;
  }

  .status-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    margin-top: 1.25rem;
    font-size: 0.78rem;
    color: #888780;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    animation: pulse 2s infinite;
  }
  .dot.stale { background: #f59e0b; animation: none; }
  .dot.error { background: #ef4444; animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.72rem;
    color: #B4B2A9;
  }

  .portal-btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 8px 18px;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.3);
    border-radius: 20px;
    color: #fff;
    font-family: 'Sarabun', sans-serif;
    font-size: .85rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    transition: background .2s, border-color .2s;
    white-space: nowrap;
  }
  .portal-btn:hover {
    background: rgba(255,255,255,.22);
    border-color: rgba(255,255,255,.6);
  }
  .portal-btn svg { width: 15px; height: 15px; fill: rgba(255,255,255,.85); flex-shrink: 0; }

  @media (max-width: 480px) {
    header { flex-direction: column; gap: 10px; text-align: center; }
    .date-info { text-align: center; }
    .big-number { font-size: 4.5rem; }
    .center-card { padding: 2rem 1.5rem; }
    .header-right { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="19" cy="19" r="18" fill="#1D4E89" stroke="#85B7EB" stroke-width="1.5"/>
      <path d="M13 11c0-1.1.9-2 2-2h8c1.1 0 2 .9 2 2 0 2-1 3.5-1.5 5-.5 1.5-.5 3 0 4.5S25 23 25 25c0 2-1.3 3-3 3-1 0-1.8-.5-3-1.5-1.2 1-2 1.5-3 1.5-1.7 0-3-1-3-3 0-2 1-3 1.5-4.5s.5-3 0-4.5S13 13 13 11z" fill="#85B7EB"/>
    </svg>
    <div>
      <h1>แผนกทันตกรรม</h1>
      <div class="sub">โรงพยาบาลเลาขวัญ</div>
    </div>
  </div>
  <div class="header-right">
    <div class="date-info">
      <strong id="today-date">—</strong>
      <span id="today-day">—</span>
    </div>
    <a class="portal-btn" href="portal/login.php">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
      เข้าสู่ระบบแพทย์
    </a>
  </div>
</header>

<main>
  <div class="center-card">
    <div class="card-label">ผู้ป่วยนัดวันนี้</div>
    <div class="big-number" id="total-count">—</div>
    <div class="unit">ราย</div>

    <hr class="divider">

    <div class="date-display" id="data-date">—</div>
    <div class="update-time">อัพเดทล่าสุด <span id="update-time">—</span> น.</div>

    <div class="status-row">
      <div class="dot" id="status-dot"></div>
      <span id="status-text">กำลังโหลด...</span>
    </div>
  </div>
</main>

<footer>
  ข้อมูลจากระบบ HosXP · อัพเดทอัตโนมัติทุก 5 นาที ช่วง 07:00–08:00 น.
</footer>

<script>
const DATA_URL = 'data/dental_today.json';
const thaiDays = ['อาทิตย์','จันทร์','อังคาร','พุธ','พฤหัสบดี','ศุกร์','เสาร์'];
const thaiMonths = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];

function thaiDate(d) {
  return `${d.getDate()} ${thaiMonths[d.getMonth()]} ${d.getFullYear() + 543}`;
}

function setHeader() {
  const now = new Date();
  document.getElementById('today-date').textContent = thaiDate(now);
  document.getElementById('today-day').textContent = 'วัน' + thaiDays[now.getDay()];
}

function setStatus(type, text) {
  const dot = document.getElementById('status-dot');
  dot.className = 'dot' + (type !== 'ok' ? ' ' + type : '');
  document.getElementById('status-text').textContent = text;
}

async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    document.getElementById('total-count').textContent = data.total_count ?? '—';

    if (data.date) {
      const d = new Date(data.date);
      document.getElementById('data-date').textContent =
        `ประจำวัน${thaiDays[d.getDay()]}ที่ ${thaiDate(d)}`;
    }

    if (data.generated_at) {
      document.getElementById('update-time').textContent =
        data.generated_at.substring(11, 16);
    }

    const today = new Date().toISOString().substring(0, 10);
    if (data.date && data.date !== today) {
      setStatus('stale', `ข้อมูลวันที่ ${data.date} — ยังไม่มีข้อมูลวันนี้`);
    } else {
      setStatus('ok', 'ข้อมูลล่าสุด · รีเฟรชอัตโนมัติทุก 5 นาที');
    }
  } catch (e) {
    document.getElementById('total-count').textContent = '—';
    setStatus('error', 'โหลดไม่ได้: ' + e.message);
  }
}

function shouldRefresh() {
  const t = new Date();
  const m = t.getHours() * 60 + t.getMinutes();
  return m >= 420 && m < 480;
}

setHeader();
loadData();
setInterval(() => { if (shouldRefresh()) loadData(); }, 5 * 60 * 1000);
setInterval(setHeader, 60000);
</script>
</body>
</html>
